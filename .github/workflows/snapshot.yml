name: Treasury Snapshot

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run snapshot script
        run: node scripts/snapshot.js

      - name: Commit & push snapshot
        run: |
          git config user.name "Treasury Bot"
          git config user.email "bot@cronostreasury.github.io"
          git add public/treasury-history.json
          git diff --staged --quiet || git commit -m "📸 Daily treasury snapshot $(date +%Y-%m-%d)"
          git push

  deploy:
    needs: snapshot
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest (including snapshot commit)
        run: git pull origin main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
